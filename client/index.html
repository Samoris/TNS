    <script>
      if(typeof globalThis.process==='undefined'){globalThis.process={env:{},version:'',platform:'browser',nextTick:function(f){setTimeout(f,0)}}}
      if(typeof globalThis.Buffer==='undefined'){
        (function(){
          function Buffer(arg,enc){
            if(typeof arg==='number'){this._arr=new Uint8Array(arg);return}
            if(typeof arg==='string'){
              if(enc==='hex'){var h=arg.replace(/[^0-9a-fA-F]/g,'');var a=[];for(var i=0;i<h.length;i+=2)a.push(parseInt(h.substr(i,2),16));this._arr=new Uint8Array(a)}
              else if(enc==='base64'){var b=atob(arg);var a=new Uint8Array(b.length);for(var i=0;i<b.length;i++)a[i]=b.charCodeAt(i);this._arr=a}
              else{var e=new TextEncoder();this._arr=e.encode(arg)}
            }
            else if(arg instanceof Uint8Array){this._arr=arg}
            else if(Array.isArray(arg)){this._arr=new Uint8Array(arg)}
            else{this._arr=new Uint8Array(0)}
            this.length=this._arr.length;
          }
          Buffer.from=function(a,e){return new Buffer(a,e)};
          Buffer.alloc=function(s,f){var b=new Buffer(s);if(f!==undefined)b._arr.fill(f);return b};
          Buffer.allocUnsafe=function(s){return new Buffer(s)};
          Buffer.isBuffer=function(o){return o instanceof Buffer};
          Buffer.concat=function(list){var t=0;list.forEach(function(b){t+=(b._arr||b).length});var r=new Uint8Array(t);var off=0;list.forEach(function(b){var a=b._arr||b;r.set(a,off);off+=a.length});return new Buffer(r)};
          Buffer.prototype.toString=function(enc){
            if(enc==='hex'){return Array.from(this._arr).map(function(b){return b.toString(16).padStart(2,'0')}).join('')}
            if(enc==='base64'){var s='';this._arr.forEach(function(b){s+=String.fromCharCode(b)});return btoa(s)}
            return new TextDecoder().decode(this._arr)
          };
          Buffer.prototype.slice=function(s,e){return new Buffer(this._arr.slice(s,e))};
          Buffer.prototype.copy=function(t,ts,ss,se){t._arr.set(this._arr.slice(ss||0,se),ts||0)};
          Buffer.prototype.readUInt8=function(o){return this._arr[o]};
          Buffer.prototype.writeUInt8=function(v,o){this._arr[o]=v};
          Buffer.prototype.toJSON=function(){return{type:'Buffer',data:Array.from(this._arr)}};
          Buffer.prototype[Symbol.iterator]=function(){return this._arr[Symbol.iterator]()};
          Object.defineProperty(Buffer.prototype,'buffer',{get:function(){return this._arr.buffer}});
          Object.defineProperty(Buffer.prototype,'byteOffset',{get:function(){return this._arr.byteOffset}});
          Object.defineProperty(Buffer.prototype,'byteLength',{get:function(){return this._arr.byteLength}});
          globalThis.Buffer=Buffer;
        })();
      }
    </script>
